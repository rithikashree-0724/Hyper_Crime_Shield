<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperShield | Global Defense Net</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    body {
      background-color: #0a0f14;
      margin: 0;
      color: #137fec;
      font-family: 'Public Sans', sans-serif;
    }

    #fallback-ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .status-text {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(19, 127, 236, 0.1);
      border-top-color: #137fec;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="fallback-ui">
    <div class="spinner"></div>
    <div class="status-text">Synchronizing_Neural_Link...</div>
    <div id="mount-msg" style="font-size: 8px; margin-top: 10px; opacity: 0.5;">WAITING_FOR_REACT_BOOT</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
